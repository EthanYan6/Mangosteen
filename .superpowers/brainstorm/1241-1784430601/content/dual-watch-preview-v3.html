<h2>双守页线框预览 v3</h2>
<p class="subtitle">频率放大，落在<strong>缺失的右下 1/4 圆内</strong>；信道名仍在圆右侧上方。</p>

<div class="mockup">
  <div class="mockup-header">Preview ×2</div>
  <div class="mockup-body" style="display:flex;justify-content:center;padding:24px;background:#222;">
    <svg width="512" height="256" viewBox="0 0 128 64" style="image-rendering:pixelated;border:3px solid #555;background:#000;box-shadow:0 8px 32px rgba(0,0,0,.5);">
      <!-- BACK CARD -->
      <g opacity="0.35">
        <rect x="6" y="8" width="118" height="52" rx="3" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="1 1"/>
        <path d="M 52 30 A 16 16 0 1 0 36 46" fill="none" stroke="#666" stroke-width="1" stroke-dasharray="2 2"/>
        <text x="40" y="42" fill="#555" font-size="7" font-family="monospace">445.00</text>
      </g>

      <!-- FRONT CARD — slightly taller to fit big freq in cutout -->
      <rect x="2" y="2" width="112" height="50" rx="3" fill="#0a0a0a" stroke="#e8e8e8" stroke-width="1.5"/>

      <!--
        Center (28,22), r=20 — larger gauge so SE quadrant has room for big digits
        Visible 3/4: East -> N -> W -> South (CCW). Missing: SE.
        East (48,22)  South (28,42)
        SE quadrant interior ≈ around (38,32)
      -->
      <path d="M 48 22 A 20 20 0 1 0 28 42"
            fill="none" stroke="#f0f0f0" stroke-width="1.5"/>

      <!-- ticks -->
      <g stroke="#ccc" stroke-width="0.9">
        <line x1="48" y1="22" x2="44" y2="22"/>
        <line x1="42" y1="10" x2="39" y2="13"/>
        <line x1="28" y1="2"  x2="28" y2="6"/>
        <line x1="14" y1="10" x2="17" y2="13"/>
        <line x1="8"  y1="22" x2="12" y2="22"/>
        <line x1="14" y1="34" x2="17" y2="31"/>
        <line x1="28" y1="42" x2="28" y2="38"/>
      </g>
      <text x="45" y="20" fill="#888" font-size="3.5" font-family="monospace">9</text>
      <text x="26" y="2"  fill="#888" font-size="3.5" font-family="monospace">5</text>
      <text x="3"  y="24" fill="#888" font-size="3.5" font-family="monospace">0</text>

      <!-- needle into upper-right of visible arc -->
      <line x1="28" y1="22" x2="40" y2="10" stroke="#fff" stroke-width="1.3"/>
      <circle cx="28" cy="22" r="2" fill="#fff"/>

      <!-- channel name: right of upper circle (above the cutout) -->
      <text x="52" y="12" fill="#ddd" font-size="6.5" font-family="monospace">REPEATER</text>

      <!-- BIG frequency INSIDE the missing SE quarter -->
      <!-- seated roughly at (32..54, 26..40) within the open quadrant -->
      <text x="30" y="34" fill="#fff" font-size="11" font-family="monospace" font-weight="bold">145.55</text>
      <text x="30" y="41" fill="#fff" font-size="8" font-family="monospace">0</text>
      <!-- hint box for cutout zone (preview only) -->
      <path d="M 48 22 A 20 20 0 0 1 28 42 L 28 22 Z"
            fill="#fff" fill-opacity="0.04" stroke="none"/>

      <!-- info line under gauge -->
      <text x="6" y="50" fill="#ccc" font-size="5.5" font-family="monospace">L3  CT88.5  FM  SQL3</text>
    </svg>
  </div>
</div>

<div class="section">
  <p class="label">相对 v2 的变化</p>
  <ul>
    <li>频率放大，塞进右下缺角的圆弧内侧</li>
    <li>信道名仍在圆右上方（缺角之上）</li>
    <li>仪表略放大，给数字留位</li>
  </ul>
</div>
