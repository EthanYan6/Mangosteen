<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>扫码拉你进群</title>
  <style>
    html {
      height: 100%;
      margin: 0;
    }
    body {
      margin: 0;
      min-height: 100%;
      min-height: 100dvh;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d1117;
      padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
    }
    .wechat-group-fullscreen-img {
      display: block;
      max-width: 100%;
      max-height: 100vh;
      max-height: 100dvh;
      width: auto;
      height: auto;
      object-fit: contain;
    }
    .wechat-group-back-btn {
      position: fixed;
      top: calc(12px + env(safe-area-inset-top, 0px));
      left: calc(12px + env(safe-area-inset-left, 0px));
      z-index: 10;
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.3;
      color: #e6edf3;
      background: rgba(22, 27, 34, 0.92);
      border: 1px solid #30363d;
      border-radius: 8px;
      text-decoration: none;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
    }
    .wechat-group-back-btn:hover {
      background: rgba(48, 54, 61, 0.95);
      border-color: #484f58;
    }
    .wechat-group-back-btn:focus-visible {
      outline: 2px solid #58a6ff;
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <a href="index.html" class="wechat-group-back-btn">返回刷机页面</a>
  <img class="wechat-group-fullscreen-img" src="images/wechat_group.jpg" alt="微信群二维码">
</body>
</html>
